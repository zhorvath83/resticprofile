name: Build Container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract upstream version pins
        id: versions
        run: |
          RESTICPROFILE_VERSION="$(sed -n 's/^ARG RESTICPROFILE_VERSION=//p' Dockerfile | head -n1)"
          RESTICPROFILE_MAJOR_MINOR="$(printf '%s' "${RESTICPROFILE_VERSION}" | cut -d. -f1,2)"
          echo "resticprofile_version=${RESTICPROFILE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "resticprofile_major_minor=${RESTICPROFILE_MAJOR_MINOR}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.resticprofile_version }}
            type=raw,value=${{ steps.versions.outputs.resticprofile_major_minor }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build container image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        run: |
          # renovate: datasource=docker depName=aquasec/trivy
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -e TRIVY_USERNAME="${{ github.actor }}" \
            -e TRIVY_PASSWORD="${{ secrets.GITHUB_TOKEN }}" \
            aquasec/trivy:0.65.0 image \
            --image-src remote \
            --format sarif \
            --output /work/trivy-results.sarif \
            --no-progress \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Upload Trivy results
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
